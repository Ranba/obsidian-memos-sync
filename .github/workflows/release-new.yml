name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Fix obsidian-api git URL to HTTPS
        run: |
          if [ -f package.json ]; then
            sed -i 's#ssh://git@github.com/obsidianmd/obsidian-api.git#https://github.com/obsidianmd/obsidian-api.git#g' package.json || true
          fi

      - name: Install dependencies
        run: |
          npm ci
          npm dedupe

      - name: Build plugin (skip tsc)
        run: node esbuild.config.mjs production

      - name: Prepare plugin folder
        run: |
          mkdir obsidian-memos-sync
          cp main.js manifest.json obsidian-memos-sync/
          if [ -f styles.css ]; then
            cp styles.css obsidian-memos-sync/
          fi

      # 手动触发：只打一个固定文件名的 zip，不建 Release
      - name: Zip for manual run
        if: github.event_name == 'workflow_dispatch'
        run: |
          zip -r obsidian-memos-sync-latest.zip obsidian-memos-sync

      # 打 tag：用 tag 名打包，并创建 Release
      - name: Zip for tag release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          zip -r "obsidian-memos-sync-${TAG_NAME}.zip" obsidian-memos-sync

      - name: Create release for tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          gh release create "${TAG_NAME}" \
            --title="${TAG_NAME}" \
            --draft \
            "obsidian-memos-sync-${TAG_NAME}.zip"
