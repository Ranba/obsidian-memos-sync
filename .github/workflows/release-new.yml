name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Fix obsidian-api git URL to HTTPS
        run: |
          if [ -f package.json ]; then
            sed -i 's#ssh://git@github.com/obsidianmd/obsidian-api.git#https://github.com/obsidianmd/obsidian-api.git#g' package.json || true
          fi

      - name: Install dependencies
        run: |
          npm ci
          npm dedupe

      # 关键：CI 构建直接用 esbuild，跳过 tsc 类型检查
      - name: Build plugin (skip tsc)
        run: node esbuild.config.mjs production

      - name: Prepare plugin files
        run: |
          mkdir obsidian-memos-sync
          cp main.js manifest.json obsidian-memos-sync/
          if [ -f styles.css ]; then
            cp styles.css obsidian-memos-sync/
          fi

          # 使用 github.ref_name 作为简洁的名字，例如 v1.0.0 或 master
          NAME="${GITHUB_REF_NAME}"
          zip -r "obsidian-memos-sync-${NAME}.zip" obsidian-memos-sync

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NAME="${GITHUB_REF_NAME}"

          # 如果是 tag（refs/tags/*），就创建/更新对应的 Release
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            gh release create "${NAME}" \
              --title="${NAME}" \
              --draft \
              "obsidian-memos-sync-${NAME}.zip"
          else
            echo "Not a tag (${GITHUB_REF}), skip creating release."
          fi
