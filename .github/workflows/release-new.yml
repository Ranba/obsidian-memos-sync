name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Fix obsidian-api git URL to HTTPS
        run: |
          if [ -f package.json ]; then
            sed -i 's#ssh://git@github.com/obsidianmd/obsidian-api.git#https://github.com/obsidianmd/obsidian-api.git#g' package.json || true
          fi

      - name: Install dependencies
        run: |
          npm ci
          npm dedupe

      # 关键：CI 构建直接用 esbuild，跳过 tsc 类型检查
      - name: Build plugin (skip tsc)
        run: node esbuild.config.mjs production

      - name: Prepare plugin files
        run: |
          mkdir obsidian-memos-sync
          cp main.js manifest.json obsidian-memos-sync/
          if [ -f styles.css ]; then
            cp styles.css obsidian-memos-sync/
          fi
          zip -r obsidian-memos-sync-${GITHUB_REF#refs/tags/}.zip obsidian-memos-sync

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            obsidian-memos-sync-"$tag".zip
