name: Build and Release Obsidian Plugin

on:
  push:
    tags:
      - "v*.*.*"   # 例如 v1.0.0、v0.2.3

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      # 打包为 Obsidian 可用的插件目录压缩包
      - name: Prepare plugin folder
        run: |
          mkdir obsidian-memos-sync
          cp main.js manifest.json obsidian-memos-sync/
          if [ -f styles.css ]; then
            cp styles.css obsidian-memos-sync/
          fi

      - name: Create zip
        run: |
          zip -r obsidian-memos-sync-${{ github.ref_name }}.zip obsidian-memos-sync

      - name: Upload artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-memos-sync-${{ github.ref_name }}
          path: obsidian-memos-sync-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: obsidian-memos-sync ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: obsidian-memos-sync-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
